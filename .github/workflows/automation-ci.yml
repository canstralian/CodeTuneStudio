name: GitHub Automation Tools CI

on:
  push:
    paths:
      - 'automation/**'
      - 'tests/test_automation.py'
      - '.github/workflows/automation-ci.yml'
  pull_request:
    paths:
      - 'automation/**'
      - 'tests/test_automation.py'

jobs:
  test:
    name: Test Automation Tools
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install requests
      
      - name: Run automation tests
        run: |
          python -m unittest tests.test_automation -v
      
      - name: Test CLI tools
        run: |
          python -m automation.create_branch --help
          python -m automation.create_issue --help
          python -m automation.manage_project --help
          python -m automation.create_issue --list-templates
      
      - name: Lint automation code
        run: |
          pip install flake8
          flake8 automation/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 automation/ --count --exit-zero --max-complexity=10 --max-line-length=88 --statistics

  integration-test:
    name: Integration Test (Dry Run)
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install requests
      
      - name: Test branch operations
        run: |
          # Test getting current branch
          CURRENT_BRANCH=$(git branch --show-current)
          echo "Current branch: $CURRENT_BRANCH"
          
          # Ensure we're in a clean state
          git fetch origin
          git status
      
      - name: Test dry-run issue creation
        run: |
          python -m automation.create_issue \
            --template bug \
            --title "Test Issue (Dry Run)" \
            --description "This is a test issue created in dry-run mode" \
            --labels test \
            --dry-run
      
      - name: Test dry-run project creation
        run: |
          python -m automation.manage_project \
            --create "Test Project (Dry Run)" \
            --description "Test project in dry-run mode" \
            --dry-run
